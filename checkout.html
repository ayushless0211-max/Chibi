<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Anime Chibi Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="checkout-style.css">
    <link rel="stylesheet" href="store-style.css">
    
</head>
<body>

        <div class="menu-backdrop" id="menuBackdrop"></div>
    <aside class="side-menu" id="sideMenu">
        <div class="menu-header">
            <button class="menu-close-btn" id="menuCloseBtn">&times;</button>
        </div>
        <nav class="menu-links">
            <a href="index.html"><i class="fa-solid fa-house"></i> Home</a>
            <a href="store.html"><i class="fa-solid fa-store"></i> Shop</a>
            <a href="#"><i class="fa-solid fa-tags"></i> Offers</a>
            <a href="profile.html"><i class="fa-solid fa-envelope"></i> Profile</a>
            <a href="#"><i class="fa-solid fa-envelope"></i> Contact Us</a>
        </nav>
    </aside>

    <nav class="navbar">
        <div class="nav-actions">
            <button class="menu-btn" id="menuOpenBtn">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <div class="login-cart-btn" style="margin-left:auto; display: flex;">
                <a href="index.html" class="nav-btn" style="border-radius: 0px; padding: 8px 20px; background-color: #007bff; margin-right: 0px; font-size: 16px; color: #ffffff; text-decoration: none; display: flex; align-items: center;">
                    <i class="fa-solid fa-house"></i>
                </a>
                <a href="cart.html" class="nav-btn" style="margin-left: 15px; border-radius: 0px; padding: 8px 20px; background-color: #007bff; margin-right: 0px; font-size: 16px; color: #ffffff; text-decoration: none; display: flex; align-items: center;">
                    <i class="fa-solid fa-cart-shopping"></i>
                </a>
                <a href="login.html" id="login-btn">Log In</a>
            </div>
            </div>
    
    </nav>

    <div class="checkout-wrapper">
        <div class="checkout-container">
            
            <div class="checkout-form-section">
                <h2 class="section-title">Shipping Information</h2>
                <form id="checkoutForm">
                    <div class="form-group">
                        <label for="fullName">Full Name</label>
                        <input type="text" id="fullName" placeholder="Enter your full name" required>
                    </div>

                    <div class="form-group">
                        <label for="phoneNumber">Phone Number</label>
                        <input type="tel" id="phoneNumber" placeholder="10-digit mobile number" required pattern="[0-9]{10}">
                    </div>

                    <div class="checkout-grid-container">
                        <div style="text-align:center;" class="form-group field-address">
                            <label for="address">Shipping Address</label>
                            <input type="text" id="address" placeholder="House No, Building, Street Name" required>
                        </div>
                        <div class="form-group field-pincode">
                            <label for="pincode">Pincode</label>
                            <input type="text" id="pincode" placeholder="6-digit PIN" required pattern="[0-9]{6}">
                        </div>
                    

                    
                        <div class="form-group field-city">
                            <label for="city">City</label>
                            <input type="text" id="city" placeholder="City" required>
                        </div>
                        <div class="form-group field-state">
                            <label for="state">State</label>
                            <input type="text" id="state" placeholder="State" required>
                        </div>
                    </div>

                    <h2 class="section-title" style="margin-top: 30px;">Payment Method</h2>
                    <div class="payment-methods">
                        <label class="payment-option active">
                            <input type="radio" name="payment" value="COD" checked>
                            <div class="option-content">
                                <i class="fa-solid fa-truck-ramp-box"></i>
                                <span>Cash on Delivery (COD)</span>
                            </div>
                        </label>
                    </div>

                    <button type="submit" class="place-order-btn" id="placeOrderBtn">Confirm & Place Order</button>
                </form>
            </div>

            <div class="checkout-summary-section">
                <div class="summary-sticky-box">
                    <h3 class="summary-title">Review Your Order</h3>
                    
                    <div class="checkout-items-list" id="checkoutItemsList">
                        </div>

                    <hr class="summary-divider">

                    <div class="price-details">
                        <div class="price-row">
                            <span>Subtotal</span>
                            <span id="checkoutSubtotal">₹0</span>
                        </div>
                        <div class="price-row">
                            <span>Delivery Charges</span>
                            <span style="color: #10b981; font-weight: 500;">FREE</span>
                        </div>
                        <hr class="summary-divider">
                        <div class="price-row total-row">
                            <span>Total Amount</span>
                            <span id="checkoutTotal">₹0</span>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script type="module" src="checkout.js"></script>
    <script type="module" src="store.js"></script>
    
</body>
</html>
