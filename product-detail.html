<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product View Screen</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="product-style.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="pagePreloader" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #ffffff; z-index: 99999; display: flex; justify-content: center; align-items: center; transition: opacity 0.3s ease;">
      <p style="font-family: sans-serif; color: #475569; font-size: 16px; font-weight: 500;">Loading Anime Asset Info...</p>
  </div>

  <div class="menu-backdrop" id="menuBackdrop"></div>

    <aside class="side-menu" id="sideMenu">
      <div class="menu-header">
        <button class="menu-close-btn" id="menuCloseBtn">&times;</button>
      </div>
      <nav class="menu-links">
        <a href="index.html"><i class="fa-solid fa-house"></i> Home</a>
        <a href="#"><i class="fa-solid fa-store"></i> Shop</a>
        <a href="#"><i class="fa-solid fa-tags"></i> Offers</a>
        <a href="profile.html"><i class="fa-solid fa-envelope"></i> Profile</a>
        <a href="#"><i class="fa-solid fa-envelope"></i> Contact Us</a>
      </nav>
    </aside>

    <nav class="navbar">
      <div class="nav-actions">
        <button class="menu-btn" id="menuOpenBtn">
          <span></span>
          <span></span>
          <span></span>
        </button>
<!--here-->
        <div class="login-cart-btn" style="margin-left:auto; display: flex;">
          <a href="login.html" id="cart-nav-btn" style="border-radius: 0px; padding: 8px 20px; background-color: #007bff; margin-right: 0px; font-size: 16px; color: #ffffff; text-decoration: none; display: flex; align-items: center;">
            <i class="fa-solid fa-cart-shopping"></i>
          </a>
          <a href="login.html" id="login-btn">Log In</a>
        </div>
      </div>
    </nav>
  <div class="main-container">
    <div class="product-page-wrapper">
      
      <div class="gallery-section">
        <div class="main-image-box">
          <img id="mainProductImg" src="" alt="Main Product View">
        </div>
        <div id="thumbnailContainer" class="thumbnail-row"></div>
      </div>

      <div class="info-section">
        <nav class="breadcrumb">Home &gt; Shop &gt; Category</nav>
        <h1 id="mainProductTitle" class="product-title">Loading Title...</h1>
        
        <div class="rating-box">
          <span class="stars">★★★★★</span>
          <span class="reviews-count">(0 reviews)</span>
        </div>
        
        <div id="mainProductPrice" class="product-price">Loading Price...</div>
        <p class="product-description">Loading data from decentralized node database...</p>

        <div class="purchase-actions">
          <button id="detailAddToCartBtn" class="add-cart-btn"><i class="fa-solid fa-cart-shopping"></i> Add to Cart</button>
          <button id="detailBuyNowBtn" class="buy-now-btn">Buy Now</button>
        </div>
      </div>

    </div>

    <div class="reviews-section-wrapper" style="padding: 20px; text-align: left;">
      <h2 class="reviews-heading">Customer Reviews</h2>
      <div id="reviewsContainer"></div>

      <div class="add-review-box" style="margin-top: 40px; padding-top: 30px; border-top: 2px solid #f1f5f9;">
        <h3>Write a Review</h3>
        <form id="reviewForm" style="display: flex; flex-direction: column; gap: 15px;">
          <input type="text" id="reviewerName" required placeholder="Enter your name" style="padding:12px; border-radius:8px; border:1px solid #e2e8f0;">
          <select id="reviewRating" style="padding:12px; border-radius:8px; color:#ffbc00; font-weight:bold;">
              <option value="5">★★★★★ (5 Stars)</option>
              <option value="4">★★★★☆ (4 Stars)</option>
              <option value="3">★★★☆☆ (3 Stars)</option>
              <option value="2">★★☆☆☆ (2 Stars)</option>
              <option value="1">★☆☆☆☆ (1 Star)</option>
          </select>
          <textarea id="reviewerComment" required rows="4" placeholder="Your review text..." style="padding:12px; border-radius:8px; border:1px solid #e2e8f0;"></textarea>
          <button type="submit" style="background-color: #ff5722; color: white; padding: 15px; border-radius: 8px; border:none; font-weight: 600;">Submit Review</button>
        </form>
      </div>
    </div>
  </div>

  <script type="module" src="product.js"></script
    <script type="module" src="script.js"></script>
</body>
</html>
